# Smithery.ai MCP server manifest
# https://smithery.ai/docs/config

name: korture-hiring
displayName: Korture Hiring
description: Korture Hiring turns a job description into a behavioural measurement brief. Returns the 5 behaviours that actually matter for the role, the evidence behind each one, demand levels from 1 to 5, interview questions tied to every behaviour, and a population check on how rare this hire really is. Built on Korture Science.
homepage: https://www.korture.com
repository: https://github.com/skprasad-korture/korture-mcp
license: Apache-2.0

# Remote MCP server (no install required)
runtime: remote
endpoint: https://mcp.korture.com/api/mcp
transport: streamable-http

# OAuth 2.1 discovery (MCP spec 2025-03-26)
authorizationServerMetadata: https://hire.korture.com/.well-known/oauth-authorization-server
protectedResourceMetadata: https://mcp.korture.com/.well-known/oauth-protected-resource

categories:
  - hiring
  - recruiting
  - behavioral-analysis
  - job-descriptions

tags:
  - behavioral-hiring
  - interview-preparation
  - job-description-analysis
  - riasec
  - onet
  - korture

tools:
  - validate_jd
  - create_brief
  - get_brief
  - enrich_brief
  - get_dimensions
  - get_stats
  - get_external_population_check
